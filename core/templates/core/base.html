<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Internal Orders{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-gray-900 text-white">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="font-bold text-lg">
                Luminex Orders
            </div>

            <div class="flex items-center gap-4 text-sm">
                {% if request.user.is_authenticated %}
                    <a href="/" class="hover:text-gray-300">Αρχική</a>
                    <a href="/orders/" class="hover:text-gray-300">Παραγγελίες</a>
                    <a href="/orders/shop/" class="hover:text-gray-300">Νέα Παραγγελία</a>

                    {% if request.user.is_superuser %}
                        <a href="/users/" class="hover:text-gray-300">Χρήστες</a>
                        <a href="/dashboard/" class="hover:text-gray-300">Dashboard</a>
                        <a href="/products/" class="hover:text-gray-300">Προϊόντα</a>
                        <a href="/admin/" class="hover:text-gray-300">Admin</a>
                    {% endif %}

                    <span class="text-gray-300">
                        {{ request.user.username }}
                    </span>

                    <form method="post" action="{% url 'logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-white">
                            Αποσύνδεση
                        </button>
                    </form>
                {% else %}
                    <a href="/login/" class="hover:text-gray-300">Σύνδεση</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="py-6">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
